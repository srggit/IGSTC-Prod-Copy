<template>
    <div class="report-shell">
        <div class="report-toolbar">
            <div class="toolbar-main">
                <lightning-combobox class="calltype-filter" name="callType" label="Call Type" value={callType}
                    options={callTypeOptions} placeholder="All call types"
                    onchange={handleCallTypeChange}></lightning-combobox>
                <template if:true={showProposalStage}>
                    <lightning-combobox class="stage-filter" name="proposalStage" label="Proposal stage" value={stage}
                        options={stageOptions} placeholder="All stages"
                        onchange={handleStageChange}></lightning-combobox>
                </template>
            </div>
        </div>

        <template if:true={isLoading}>
            <div class="state-block">
                <lightning-spinner alternative-text="Loading" size="medium"></lightning-spinner>
            </div>
        </template>

        <template if:true={showEmptyState}>
            <div class="state-block empty-state">
                <p class="empty-title">No reviewer mappings</p>
                <p class="empty-sub">Try another stage or move to another page.</p>
            </div>
        </template>

        <template if:true={hasRows}>
            <div class="table-scroll table-panel" role="region" aria-label="Reviewer scores by proposal">
                <table class="score-table">
                    <thead>
                        <tr>
                            <th scope="col" class="th-proposal">Proposal</th>
                            <template for:each={reviewers} for:item="rev">
                                <th key={rev} scope="col" class="th-reviewer">
                                    <span class="th-reviewer-inner">{rev}</span>
                                </th>
                            </template>
                            <th scope="col" class="th-avg">Avg</th>
                        </tr>
                    </thead>
                    <tbody>
                        <template for:each={rows} for:item="row">
                            <tr key={row.proposalId}>
                                <th scope="row" class="td-proposal">{row.proposalName}</th>
                                <template for:each={row.reviewerList} for:item="cell">
                                    <td key={cell.key} class="td-score">{cell.value}</td>
                                </template>
                                <td class="td-avg">{row.avgScore}</td>
                            </tr>
                        </template>
                    </tbody>
                </table>
            </div>
        </template>

        <template if:false={isLoading}>
            <div class="pager-row">
                <nav class="pager pager--bottom" role="navigation" aria-label="Pagination">
                    <button type="button" class="pager-link" onclick={prevPage} disabled={isPrevDisabled}>
                        Prev
                    </button>
                    <span class="pager-current" aria-current="page">{pageNumber}</span>
                    <button type="button" class="pager-link" onclick={nextPage} disabled={isLoading}>
                        Next
                    </button>
                </nav>
            </div>
        </template>
    </div>
</template>
